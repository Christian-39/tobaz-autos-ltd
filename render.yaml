services:
  - type: web
    name: tobaz-autos
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn tobaz_autos.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: USE_SQLITE
        value: "True"
