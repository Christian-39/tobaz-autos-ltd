{% extends 'base.html' %}

{% block title %}{{ title }}{% endblock %}
{% block meta_description %}{{ meta_description }}{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <img src="/static/images/logo.png" alt="Tobaz Autos" style="width: 80px; height: 80px; margin-bottom: 1rem;">
                    <h2 class="h3 mb-2" style="color: var(--text-primary);">Welcome Back</h2>
                    <p class="mb-0" style="color: var(--text-secondary);">Sign in to your account</p>
                </div>
                
                <form method="post" novalidate>
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label" style="color: var(--text-primary);">Username</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--bg-secondary); border-color: var(--border-color);">
                                <i class="fas fa-user" style="color: var(--text-muted);"></i>
                            </span>
                            <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label" style="color: var(--text-primary);">Password</label>
                        <div class="input-group">
                            <span class="input-group-text" style="background: var(--bg-secondary); border-color: var(--border-color);">
                                <i class="fas fa-lock" style="color: var(--text-muted);"></i>
                            </span>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword(this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember">
                            <label class="form-check-label" for="remember" style="color: var(--text-secondary);">Remember me</label>
                        </div>
                        <a href="#" style="color: var(--primary-color); font-size: 0.875rem;">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                    
                    <div class="text-center">
                        <p class="mb-0" style="color: var(--text-secondary);">
                            Don't have an account? 
                            <a href="{% url 'users:register' %}" style="color: var(--primary-color);">Sign up</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(btn) {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
</script>

<style>
    .input-group-text {
        color: var(--text-primary);
    }
    
    .form-check-input:checked {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
    }
</style>
{% endblock %}
